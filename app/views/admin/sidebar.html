<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="../../../public/css/sidebar.css">

<body>

    <div class="sidebar close">

            </div>
            <div class="link">
                <i class="bi bi-file-richtext-fill"></i>

            </div>
            <div class="link">

            <div class="link">
                <i class="bi bi-box-arrow-right"></i>
