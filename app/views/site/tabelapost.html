<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tabela de Posts</title>

    <link rel="stylesheet" href="../../../public/css/tabelapost.css">

    <link 
    rel="stylesheet" 
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

    <div class="layout">

        <aside class="sidebar"></aside>

        <main class="conteudo">

            <header class="topbar">

                <div class="titulo-area">

                    <i class="bi bi-card-checklist"></i>

                    <h1>Tabela de Posts</h1>

                </div>

                <div class="perfil">

                    <i class="bi bi-bell"></i>

                    <div class="avatar">

                        <img 
                        src="../../../public/assets/fotousuario.jpg" 
                        alt="Foto do usuário"
                        class="foto-perfil">

                    </div>

                    <button class="botao-admin">

                        Admin

                        <i class="bi bi-caret-down-fill"></i>

                    </button>

                </div>

            </header>

            <section class="secao-tabela">

                <div class="acoes-tabela">

                    <div class="botoes-esquerda">

                        <button>

                            <i class="bi bi-plus-square"></i>

                            Adicionar

                        </button>

                        <button>

                            <i class="bi bi-calendar-event"></i>

                        </button>

                    </div>

                    <div class="caixa-pesquisa">

                        <input type="text" placeholder="Buscar posts">

                        <i class="bi bi-search"></i>

                    </div>

                </div>

                <div class="tabela-posts">

                    <div class="cabecalho-tabela">

                        <span>ID</span>
                        <span>Título</span>
                        <span>Autor</span>
                        <span>Categoria</span>
                        <span>Data</span>
                        <span>Ações</span>

                    </div>

                    

                    <div class="linha-post">

                        <span>0123456789</span>

                        <div class="info-post">

                            <img 
                            src="../../../public/assets/portacopo.jpg"
                            alt="Post">

                            <p>Porta Copo</p>

                        </div>

                        <div class="info-autor">

                            <img 
                            src="../../../public/assets/fotousuario.jpg"
                            alt="Autor">

                            <p>Vasco da Gama</p>

                        </div>

                        <div class="tag">
                            Post
                        </div>

                        <span>25/04/2026</span>

                        <div class="acoes">

                            <button>
                                <i class="bi bi-eye"></i>
                            </button>

                            <button>
                                <i class="bi bi-pencil"></i>
                            </button>

                            <button>
                                <i class="bi bi-trash"></i>
                            </button>

                        </div>

                    </div>

                    
                    <div class="linha-post">

                        <span>8473628190</span>

                        <div class="info-post">

                            <img 
                            src="../../../public/assets/dory.jpg"
                            alt="Post">

                            <p>Dory</p>

                        </div>

                        <div class="info-autor">

                            <img 
                            src="../../../public/assets/fotousuario.jpg"
                            alt="Autor">

                            <p>Hadassa</p>

                        </div>

                        <div class="tag">
                            Tutorial
                        </div>

                        <span>02/05/2026</span>

                        <div class="acoes">

                            <button>
                                <i class="bi bi-eye"></i>
                            </button>

                            <button>
                                <i class="bi bi-pencil"></i>
                            </button>

                            <button>
                                <i class="bi bi-trash"></i>
                            </button>

                        </div>

                    </div>

                   
                    <div class="linha-post">

                        <span>9182736455</span>

                        <div class="info-post">

                            <img 
                            src="../../../public/assets/toucafrango.jpg"
                            alt="Post">

                            <p>Touca de Frango</p>

                        </div>

                        <div class="info-autor">

                            <img 
                            src="../../../public/assets/fotousuario.jpg"
                            alt="Autor">

                            <p>Maria Luiza</p>

                        </div>

                        <div class="tag">
                            Dicas
                        </div>

                        <span>10/05/2026</span>

                        <div class="acoes">

                            <button>
                                <i class="bi bi-eye"></i>
                            </button>

                            <button>
                                <i class="bi bi-pencil"></i>
                            </button>

                            <button>
                                <i class="bi bi-trash"></i>
                            </button>

                        </div>

                    </div>

                    
                    <div class="linha-post">

                        <span>6655443322</span>

                        <div class="info-post">

                            <img 
                            src="../../../public/assets/mascaracroche.jpg"
                            alt="Post">

                            <p>Mascara com Rosa</p>

                        </div>

                        <div class="info-autor">

                            <img 
                            src="../../../public/assets/fotousuario.jpg"
                            alt="Autor">

                            <p>Murilo</p>

                        </div>

                        <div class="tag">
                            Materiais
                        </div>

                        <span>15/05/2026</span>

                        <div class="acoes">

                            <button>
                                <i class="bi bi-eye"></i>
                            </button>

                            <button>
                                <i class="bi bi-pencil"></i>
                            </button>

                            <button>
                                <i class="bi bi-trash"></i>
                            </button>

                        </div>

                    </div>

                    <div class="paginacao">

                        <button>
                            <i class="bi bi-chevron-left"></i>
                        </button>

                        <button class="ativo">1</button>

                        <button>2</button>

                        <button>3</button>

                        <span>...</span>

                        <button>6</button>

                        <button>
                            <i class="bi bi-chevron-right"></i>
                        </button>

                    </div>

                </div>

            </section>

        </main>

    </div>

    <!-- Modal Criar Post -->
    <form class="modalContainer" id="modalCriar" action="" method="post" enctype="multipart/form-data">

        <div class="header">
            <img src="../../../public/assets/Novelo_cortado.png" alt="">
            <p>Criar Post</p>
        </div>

        <div class="formContent">
            <!-- Upload Imagem -->
            <label class="uploadImage" for="imagemPost">
                <i class="bi bi-cloud-arrow-up-fill"></i>
                <p>Arraste uma nova imagem ou <b>clique para fazer upload</b></p>
            </label>
            <input type="file" id="imagemPost" name="imagem" accept="image/*" hidden>

            <!-- Título -->
            <label>Título do Post*</label>
            <input type="text" name="titulo" placeholder="Digite o título do post" required>

            <!-- Descrição -->
            <label>Descrição*</label>
            <textarea type="text" name="descricao" placeholder="Digite a descricao" required></textarea>

            <!-- Categorias -->
            <label>Categoria(s)*</label>
            <input type="text" name="categorias" placeholder="Adicione categorias (ex: tutoriais, roupas e etc)">

            <div class="modalActions">
                <button class="btnCancel" type="button">Cancelar</button>
                <button class="btnCreate" type="submit">Criar</button>
            </div>
        </div>
            
    </form>

</body>
</html>
