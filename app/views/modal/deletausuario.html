<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete usuario</title>
</head>
<body>
    <form class="modaldelete" id="modaldelete" action="" method="post">
        <div class="box-delete">
            <span class="vetor-atencao">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-triangle-alert-icon lucide-triangle-alert">
                    <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3"/>
                    <path d="M12 9v4"/>
                    <path d="M12 17h.01"/>
                </svg>
            </span>

            <div class="title-delete">
                <p>Deletar Usuário</p>
            </div>

            <div class="text-delete">
                <p>Você tem certeza que deseja deletar este usuário?</p>
                <p>Esta ação não poderá ser desfeita.</p>
            </div>

            <div class="button-delete">
                <button class="cancel-delete" type="button">Não, mantê-lo.</button>
                <button class="confirm-delete" type="submit">Sim, deletar!</button>
            </div>
        </div>
    </form>    
</body>
</html>
